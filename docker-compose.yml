version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reservierung
      POSTGRES_USER: reservierung
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservierung"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://reservierung:${DB_PASSWORD:-changeme_in_production}@db:5432/reservierung
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_in_production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  # React Frontend
  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  # Caddy Reverse Proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-internal}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
